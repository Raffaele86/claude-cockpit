appId: app.claudecockpit
productName: Claude Cockpit
copyright: © Claude Cockpit contributors

directories:
  output: dist-win
  buildResources: build

# main.cjs usa solo built-in Electron; React/marked/xterm sono già in dist/ (bundle Vite).
# Nessuna dependency runtime → niente node_modules nel pacchetto (pacchetto snello, zero native deps).
files:
  - electron/**
  - dist/**
  - package.json

# portable + nsis (nsis richiede wine + wine32:i386 per makensis a 32 bit).
win:
  icon: build/icon.ico
  target:
    - portable
    - nsis

# Build macOS da Linux: solo zip, NON firmata/notarizzata → al primo avvio serve
# tasto destro → Apri (o `xattr -cr` sull'app). dmg richiede macOS per il packaging.
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: zip
      arch: [arm64, x64]
  artifactName: ClaudeCockpit-mac-${arch}-${version}.zip

portable:
  artifactName: ClaudeCockpit-portable-${version}.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ClaudeCockpit-setup-${version}.exe
