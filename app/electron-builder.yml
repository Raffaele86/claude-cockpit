appId: app.claudecockpit
productName: Claude Cockpit
copyright: © Claude Cockpit contributors

directories:
  output: dist-win
  buildResources: build

# main.cjs usa built-in Electron + electron-updater (unica dependency runtime, inclusa
# automaticamente da electron-builder); React/marked/xterm sono già in dist/ (bundle Vite).
files:
  - electron/**
  - dist/**
  - package.json

# Genera latest.yml + blockmap per l'auto-update (electron-updater legge le GitHub Releases).
# L'upload NON parte da qui (default --publish never): lo fa scripts/build-raffa.sh --release.
publish:
  provider: github
  owner: Raffaele86
  repo: claude-cockpit

# portable + nsis (nsis richiede wine + wine32:i386 per makensis a 32 bit).
win:
  icon: build/icon.ico
  target:
    - portable
    - nsis

# Build macOS da Linux: solo zip, NON firmata/notarizzata → al primo avvio serve
# tasto destro → Apri (o `xattr -cr` sull'app). dmg richiede macOS per il packaging.
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: zip
      arch: [arm64, x64]
  artifactName: ClaudeCockpit-mac-${arch}-${version}.zip

portable:
  artifactName: ClaudeCockpit-portable-${version}.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ClaudeCockpit-setup-${version}.exe
